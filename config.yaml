# 优化后的关键词，增加上下文减少歧义
keywords:
  - "Bayesian optimization engineering"
  - "Mixed lubrication EHL"
  - "Superlubricity tribology"
  - "Gear dynamics vibration"
  - "Elastohydrodynamic lubrication simulation"

arxiv:
  max_results: 150 # 减小单次量，提高质量
  categories:
    - "physics.app-ph"  # 应用物理（核心）
    - "cs.CE"           # 计算工程（核心）
    - "nlin.CD"         # 非线性动力学（齿轮动力学相关）
    - "cs.LG"           # 机器学习应用
    - "math.NA"         # 数值分析（求解器相关）

llm:
  min_score: 75         # 略微调高门槛
  temperature: 0.1      # 降低随机性，使评分更客观
  # 建议在调用时，将你的“大传动比GTF非对称齿轮”等具体课题作为“Expert Context”输入
